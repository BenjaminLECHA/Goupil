services:
  app:
    build:
      context: .
    image: goupil:latest
    container_name: goupil
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - goupil_postgres
    volumes:
      - ./uploads:/app/uploads

  goupil_postgres:
    image: postgres:18.1@sha256:1090bc3a8ccfb0b55f78a494d76f8d603434f7e4553543d6e807bc7bd6bbd17f
    container_name: goupil_postgres
    restart: unless-stopped
    volumes:
      - ./goupil_db:/var/lib/postgresql
      - ./BDD/database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    env_file: .env

  adminer:
    image: adminer:5.5.0@sha256:494d4a9461105644222c938679fe58d5e3fd13fb228c76a426e81c16d4ffbaef
    container_name: adminer
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - goupil_postgres

  mailpit:
    # image: axllent/mailpit à la place de mailhog (non maintenu)
    image: axllent/mailpit:v1.30@sha256:b868afa176bfd6cce2323ea316cd99ccad77915e51e595748f6d786700ecf109
    container_name: mailpit
    restart: unless-stopped
    ports:
      - 1025:1025
      - 8025:8025

